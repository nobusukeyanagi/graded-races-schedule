name: Notify Discord

on:
  schedule:
    # JST 01:47の先行実行は、02:00まで待機して通知する。
    - cron: '47 16 * * *'
    # JST 02:17の予備実行。先行実行で通知済みなら送信をスキップする。
    - cron: '17 17 * * *'
  workflow_dispatch:
    inputs:
      notify_date:
        description: '通知する日付 YYYY-MM-DD（空欄なら日本時間の当日）'
        required: false
        type: string
      force_notify:
        description: '同じ日付を通知済みでも再送する'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# 先行実行が02:00まで待っている間は、後続実行を並列で動かさない。
# 最初の実行が通知状態を保存した後、後続実行は最新mainを取得して重複を回避する。
concurrency:
  group: notify-discord
  cancel-in-progress: false

jobs:
  notify:
    name: Send public racing schedule to Discord
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Wait until 02:00 JST for early scheduled runs
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          python - <<'PY'
          from datetime import datetime
          import time
          from zoneinfo import ZoneInfo

          jst = ZoneInfo("Asia/Tokyo")
          now = datetime.now(jst)
          target = now.replace(hour=2, minute=0, second=0, microsecond=0)

          if now < target:
              wait_seconds = int((target - now).total_seconds())
              print(
                  f"現在は日本時間 {now:%H:%M:%S}。"
                  f"2:00まで{wait_seconds}秒待機します。"
              )
              time.sleep(wait_seconds)
          else:
              print(f"現在は日本時間 {now:%H:%M:%S}。直ちに通知処理へ進みます。")
          PY

      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Show trigger information
        shell: bash
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u '+UTC=%Y-%m-%d %H:%M:%S'
          TZ=Asia/Tokyo date '+JST=%Y-%m-%d %H:%M:%S'

      - name: Send public racing schedule
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          NOTIFY_DATE: ${{ inputs.notify_date }}
          FORCE_NOTIFY: ${{ inputs.force_notify }}
        run: python gradedraces/scripts/send_discord.py

      - name: Save notification state
        run: |
          STATE='gradedraces/discord_notification_state.json'

          if [ ! -f "$STATE" ]; then
            echo '通知状態に変更はありません。'
            exit 0
          fi

          git config user.name 'graded-races-bot'
          git config user.email 'graded-races-bot@users.noreply.github.com'
          git add "$STATE"

          if git diff --cached --quiet; then
            echo '通知状態に変更はありません。'
          else
            git commit -m 'Save Discord notification state'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
