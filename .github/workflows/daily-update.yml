name: Daily graded-race update

on:
  schedule:
    # 日本時間の毎朝6:17。毎時00分を避け、実行混雑による遅延を抑えます。
    - cron: "17 6 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      base_date:
        description: "任意の基準日 YYYY-MM-DD（空欄なら当日）"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: graded-races-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update official race information
        env:
          BASE_DATE: ${{ inputs.base_date }}
        run: |
          if [ -n "$BASE_DATE" ]; then
            python -m scripts.update_races --date "$BASE_DATE" --before 3 --after 3 --fail-if-all-sources-fail
          else
            python -m scripts.update_races --before 3 --after 3 --fail-if-all-sources-fail
          fi

      - name: Validate JSON
        run: python -m scripts.validate_races races.json

      - name: Embed JSON into HTML
        run: |
          python -m scripts.sync_html --json races.json --html graded_races_schedule.html
          cp graded_races_schedule.html index.html

      - name: Upload diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graded-race-update-report
          path: |
            changes.json
            source_status.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated files
        run: |
          if git diff --quiet -- races.json graded_races_schedule.html index.html changes.json source_status.json; then
            echo "変更はありません。"
            exit 0
          fi
          git config user.name "graded-races-bot"
          git config user.email "graded-races-bot@users.noreply.github.com"
          git add races.json graded_races_schedule.html index.html changes.json source_status.json
          git commit -m "Update graded races $(date -u +'%Y-%m-%d')"
          git push
